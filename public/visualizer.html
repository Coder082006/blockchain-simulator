<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Visual Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1e3f 0%, #1a2a4f 100%);
            height: 100vh;
            overflow: hidden;
            color: #00ff88;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff88;
            padding: 20px;
            overflow-y: auto;
            border-right: 2px solid #00ff88;
        }

        .sidebar h2 {
            margin-bottom: 20px;
            color: #00ff88;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .control-group {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 255, 136, 0.08);
            border-left: 3px solid #00ff88;
            border-radius: 5px;
        }

        .control-group label {
            display: block;
            font-size: 11px;
            color: #00ff88;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .control-group input::placeholder {
            color: rgba(0, 255, 136, 0.4);
        }

        .control-group input:focus {
            outline: none;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #0a1f2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            transition: all 0.3s;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .btn:hover {
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #ff0000);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.05) 0%, transparent 50%);
            overflow: hidden;
        }

        canvas {
            display: block;
            background: linear-gradient(135deg, #0f1e3f 0%, #1a2a4f 100%);
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 340px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 15px;
            color: #00ff88;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            max-height: 180px;
            overflow-y: auto;
        }

        .status {
            margin: 5px 0;
            line-height: 1.6;
        }

        .status.error {
            color: #ff4444;
        }

        .status.success {
            color: #00ff88;
        }

        .status.warning {
            color: #ffaa00;
        }

        .sidebar h3 {
            color: #00ff88;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .block-list {
            font-size: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .block-item {
            background: rgba(0, 255, 136, 0.06);
            padding: 10px;
            margin: 5px 0;
            border-left: 2px solid #00ff88;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        .block-item.invalid {
            border-left-color: #ff4444;
            background: rgba(255, 68, 68, 0.06);
            color: #ff8888;
        }

        .block-item.mempool {
            border-left-color: #ffaa00;
            background: rgba(255, 170, 0, 0.06);
            color: #ffbb88;
            animation: pulse-mempool 2s infinite;
        }

        @keyframes pulse-mempool {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .confirmation-badge {
            display: inline-block;
            background: #00ff88;
            color: #0a1f2e;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
            margin-left: 5px;
        }

        .flow-stage {
            padding: 6px 8px;
            margin: 3px 0;
            background: rgba(15, 30, 63, 0.3);
            border-left: 2px solid #444;
            border-radius: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            font-size: 11px;
        }

        .flow-stage.active {
            background: rgba(0, 255, 136, 0.15);
            border-left-color: #00ff88;
        }

        .stage-icon {
            font-size: 12px;
        }

        .stage-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .stage-indicator.active {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
            animation: pulse-indicator 0.8s infinite;
        }

        .stage-indicator.complete {
            background: #00ff88;
        }

        @keyframes pulse-indicator {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .node-item {
            padding: 6px 8px;
            margin: 3px 0;
            background: rgba(15, 30, 63, 0.3);
            border-left: 2px solid #00ff88;
            border-radius: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
        }

        .node-item.syncing {
            border-left-color: #ffaa00;
        }

        .node-item.mining {
            border-left-color: #ff6600;
            background: rgba(255, 102, 0, 0.1);
            animation: pulse-node 1s infinite;
        }

        @keyframes pulse-node {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .node-status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            flex-shrink: 0;
        }

        .node-status-indicator.syncing {
            background: #ffaa00;
            animation: pulse-indicator 0.8s infinite;
        }

        .node-status-indicator.mining {
            background: #ff6600;
            animation: pulse-indicator 0.5s infinite;
        }

        .block-item strong {
            display: block;
            margin-bottom: 4px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 136, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 136, 0.5);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 12px;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>⛓️ Blockchain Control</h2>

            <div class="control-group">
                <label>Sender Address</label>
                <input type="text" id="senderInput" placeholder="e.g., alice" value="alice">

                <label>Recipient Address</label>
                <input type="text" id="recipientInput" placeholder="e.g., bob" value="bob">

                <label>Amount</label>
                <input type="number" id="amountInput" placeholder="e.g., 5" value="5" step="0.1">

                <button class="btn" onclick="addTransaction()">➕ Add Transaction</button>
            </div>

            <div class="control-group">
                <label>Miner Address</label>
                <input type="text" id="minerInput" placeholder="e.g., miner-1" value="miner-1">

                <button class="btn" onclick="mineBlock()">⛏️ Mine Block</button>
            </div>

            <div class="control-group">
                <label>⚠️ Tamper with Block</label>
                <input type="number" id="tamperBlockInput" placeholder="Block index (e.g., 1)" min="0" step="1">
                <button class="btn btn-danger" onclick="tamperBlockFromInput()">💥 Tamper Block</button>
            </div>

            <div class="control-group">
                <button class="btn" onclick="resetChain()">🔄 Reset Chain</button>
                <button class="btn btn-danger" onclick="startAutoDemo()">▶️ Auto Demo</button>
                <button class="btn" onclick="window.location.href='/'">🏠 Back to Home</button>
            </div>

            <h3>🌐 Network Nodes</h3>
            <div id="nodeStatusPanel" style="font-size: 11px; margin-bottom: 15px;">
                <!-- Node status indicators -->
            </div>

            <h3>⏳ Mempool (Pending Transactions)</h3>
            <div class="block-list" id="mempoolList"></div>

            <h3 style="margin-top: 20px;">🔄 Transaction Flow</h3>
            <div id="txFlowStages" style="font-size: 11px; margin-top: 10px;">
                <div class="flow-stage" data-stage="validate">
                    <span class="stage-icon">1️⃣</span> <span style="flex: 1;">Validate</span>
                    <div class="stage-indicator" id="stage-validate"></div>
                </div>
                <div class="flow-stage" data-stage="mempool">
                    <span class="stage-icon">2️⃣</span> <span style="flex: 1;">Mempool</span>
                    <div class="stage-indicator" id="stage-mempool"></div>
                </div>
                <div class="flow-stage" data-stage="bundle">
                    <span class="stage-icon">3️⃣</span> <span style="flex: 1;">Bundling</span>
                    <div class="stage-indicator" id="stage-bundle"></div>
                </div>
                <div class="flow-stage" data-stage="mine">
                    <span class="stage-icon">4️⃣</span> <span style="flex: 1;">Mining</span>
                    <div class="stage-indicator" id="stage-mine"></div>
                </div>
                <div class="flow-stage" data-stage="propagate">
                    <span class="stage-icon">5️⃣</span> <span style="flex: 1;">Propagate</span>
                    <div class="stage-indicator" id="stage-propagate"></div>
                </div>
                <div class="flow-stage" data-stage="confirm">
                    <span class="stage-icon">6️⃣</span> <span style="flex: 1;">Confirmed</span>
                    <div class="stage-indicator" id="stage-confirm"></div>
                </div>
            </div>

            <h3 style="margin-top: 20px;">📊 Chain Status</h3>
            <div class="block-list" id="blockList"></div>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <button class="back-btn" onclick="window.location.href='/'">← Back</button>
            <div class="info-panel">
                <div id="statusInfo"></div>
            </div>
        </div>
    </div>

    <script src="visualizer.js"></script>
</body>
</html>
